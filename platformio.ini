; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = arduino
lib_deps = 
    adafruit/RTClib@^2.1.4
    bblanchon/ArduinoJson@^6.21.3
board_build.filesystem = littlefs

; Настройки WiFi AP
; Для ESP32-S2 библиотека WiFi уже включена в платформу espressif32
; Библиотека DNSServer также включена в платформу espressif32
; Дополнительные библиотеки не требуются

; ============================================
; Тестовая конфигурация для верхней платы (закомментирована)
; Используйте эту конфигурацию для отдельного тестирования верхней платы
; Для активации раскомментируйте секцию [env:lolin_s2_mini_test_top_board]
; ============================================
; [env:lolin_s2_mini_test_top_board]
; platform = espressif32
; board = lolin_s2_mini
; framework = arduino
; build_flags = 
;     -DTEST_MODE
; lib_deps = 
;     adafruit/RTClib@^2.1.4
;     bblanchon/ArduinoJson@^6.21.3
; board_build.filesystem = littlefs
; monitor_speed = 115200
; monitor_filters = esp32_exception_decoder
